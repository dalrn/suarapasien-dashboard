<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuaraPasien - Mock-up Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg0:#ebe8df; --bg1:#ffffff; --bg2:#f4f2ec;
    --tp:#1a1915; --ts:#5f5e5a; --tt:#8a8880;
    --info:#185FA5; --ok:#0F6E56; --warn:#854F0B; --bad:#A32D2D;
    --bt:rgba(0,0,0,0.12); --bs:rgba(0,0,0,0.22);
    --r-md:8px; --r-lg:12px;
  }
  *{box-sizing:border-box;}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg0); color:var(--tp); margin:0; padding:28px 16px; line-height:1.6; -webkit-font-smoothing:antialiased;}
  .wrap{max-width:820px; margin:0 auto;}
  h1{font-size:20px; font-weight:500; margin:0 0 4px;}
  .sub{font-size:13px; color:var(--ts); margin:0 0 18px;}
  select,input{font-family:inherit; font-size:13px; padding:8px 10px; border:0.5px solid var(--bs); border-radius:var(--r-md); background:var(--bg1); color:var(--tp);}
  .navbtn{font-family:inherit;}
  .foot{font-size:12px; color:var(--tt); margin:10px 4px 0;}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
  .hint{font-size:11px; color:var(--tt);}
  .quotes{display:none; margin-top:9px; padding-top:9px; border-top:0.5px solid var(--bt);}
  .quote{font-size:12px; color:var(--ts); font-style:italic; padding:5px 10px; border-left:2px solid var(--bt); margin-bottom:6px; line-height:1.5;}
  .lnk{cursor:pointer; color:var(--info); font-size:12px; user-select:none;}
  .lnk:hover{text-decoration:underline;}
  .drill{display:none; margin-top:8px; background:var(--bg2); border-radius:var(--r-md); padding:10px 12px;}
  .fcard{background:var(--bg1); border:0.5px solid var(--bt); border-radius:var(--r-lg); padding:14px 15px;}
  .fcard .ic{font-size:22px; margin-bottom:8px; display:block;}
  .fcard .ft{font-size:13px; font-weight:500; margin-bottom:5px; line-height:1.4;}
  .fcard .fb{font-size:12px; color:var(--ts); line-height:1.5;}
  .leaflet-container{font-family:inherit;}
  .gm-link{color:var(--info); text-decoration:none; font-size:12px;}
</style>
</head>
<body>
<div class="wrap">
  <h1><i class="ti ti-activity-heartbeat" style="vertical-align:-3px; color:#185FA5;" aria-hidden="true"></i> SuaraPasien - Mock-up Dashboard</h1>
  <p class="sub">Rancangan tata letak. Klik tab di sidebar untuk berpindah; banyak elemen bisa diklik.</p>

<div style="display:flex; gap:0; border:0.5px solid var(--bt); border-radius:var(--r-lg); overflow:hidden; background:var(--bg1);">
  <div style="width:180px; flex-shrink:0; border-right:0.5px solid var(--bt); background:var(--bg2); padding:12px 8px;">
    <div style="font-size:13px; font-weight:500; padding:6px 10px 10px;"><i class="ti ti-activity-heartbeat" style="font-size:18px; vertical-align:-3px; margin-right:6px;" aria-hidden="true"></i>SuaraPasien</div>
    <div id="nav"></div>
    <div style="margin-top:10px; padding:8px 10px; font-size:11px; color:var(--tt); border-top:0.5px solid var(--bt);">3 wilayah, 127 puskesmas</div>
  </div>
  <div style="flex:1; min-width:0; padding:18px 20px; min-height:520px;">
    <div id="panel"></div>
  </div>
</div>
<p class="foot">Mock-up tata letak. Sumber data: ulasan publik Google Maps. Skor SERVQUAL per dimensi &amp; kutipan masih contoh, menunggu hasil model.</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const tabs = [
  ["home","ti-home","Beranda"],
  ["map","ti-map-2","Peta status"],
  ["profile","ti-stethoscope","Profil puskesmas"],
  ["signal","ti-alert-triangle","Sinyal"],
  ["topic","ti-chart-dots","Topik keluhan"],
  ["flow","ti-route","Workflow analisis"],
];
let active="home";
const navEl=document.getElementById("nav"), panelEl=document.getElementById("panel");
let mapObj=null;

const DIMS = [
  ["Responsiveness","Daya tanggap: kecepatan &amp; waktu tunggu"],
  ["Reliability","Kehandalan: obat, rujukan, layanan tepat"],
  ["Assurance","Jaminan: kompetensi &amp; kepercayaan"],
  ["Empathy","Empati: keramahan &amp; komunikasi"],
  ["Tangibles","Bukti fisik: kebersihan &amp; fasilitas"],
];

const PKM = {
  "Semarang":[["Telogosari Kulon",4.75,1955,1609],["Srondol",4.86,1686,1373],["Kedungmundu",4.61,1278,989],["Mijen",4.70,1194,982],["Ngaliyan",4.62,1188,891],["Bugangan",4.93,1030,699],["Halmahera",4.72,856,679]],
  "Surabaya":[["Medokan Ayu",4.12,1202,924],["Gading",4.37,1187,993],["Tanah Kali Kedinding",4.50,1178,894],["Dukuh Kupang",4.24,944,720],["Jagir",4.13,859,571],["Mojo",4.01,842,507],["Made",3.95,312,188]],
  "Bantul":[["Kasihan 1",4.40,1389,643],["Sewon 1",4.36,1039,716],["Banguntapan 1",4.45,755,518],["Banguntapan 3",4.48,719,529],["Bantul 1",4.52,688,444],["Kasihan 2",4.04,455,375],["Sewon 2",3.63,438,349]]
};
const CITY = {"Semarang":[-6.99,110.42],"Surabaya":[-7.27,112.74],"Bantul":[-7.89,110.36]};

function renderNav(){
  navEl.innerHTML = tabs.map(([id,icon,label])=>{
    const on=id===active;
    return `<button class="navbtn" onclick="setTab('${id}')" style="width:100%; text-align:left; border:none; background:${on?'var(--bg1)':'transparent'}; color:${on?'var(--tp)':'var(--ts)'}; font-size:13px; font-weight:${on?'500':'400'}; padding:9px 10px; border-radius:var(--r-md); margin-bottom:2px; cursor:pointer; display:flex; align-items:center; gap:9px; ${on?'box-shadow:inset 2px 0 0 #185FA5;':''}"><i class="ti ${icon}" style="font-size:17px;" aria-hidden="true"></i>${label}</button>`;
  }).join("");
}
function toggle(id){ const e=document.getElementById(id); e.style.display = e.style.display==='block'?'none':'block'; }
function statCard(label,val,sub){
  return `<div style="background:var(--bg2); border-radius:var(--r-md); padding:12px 14px;"><div style="font-size:12px; color:var(--ts); margin-bottom:4px;">${label}</div><div style="font-size:22px; font-weight:500; line-height:1.1;">${val}</div>${sub?`<div style="font-size:11px; color:var(--tt); margin-top:3px;">${sub}</div>`:""}</div>`;
}
function fcard(ic,col,title,body){
  return `<div class="fcard"><span class="ic" style="color:${col};"><i class="ti ${ic}" aria-hidden="true"></i></span><div class="ft">${title}</div><div class="fb">${body}</div></div>`;
}
function row(name, wil, a, b, tag, tagcolor, tagbg){
  return `<tr style="border-bottom:0.5px solid var(--bt);"><td style="padding:8px 6px; font-size:12px;">${name}</td><td style="padding:8px 6px; font-size:11px; color:var(--ts);">${wil}</td><td style="padding:8px 6px; font-size:12px; text-align:right;">${a}</td><td style="padding:8px 6px; font-size:12px; text-align:right;">${b}</td><td style="padding:8px 6px; text-align:right;"><span style="font-size:10px; background:${tagbg}; color:${tagcolor}; padding:2px 8px; border-radius:var(--r-md);">${tag}</span></td></tr>`;
}
function dimCard(idx, dimEng, dimDesc, friendly, score, conf, confTone, peer, badge, subs, quotes){
  const subRows = subs.map(s=>{
    const tone = s[2]==='neg'?'var(--bad)':'var(--ok)';
    const icon = s[2]==='neg'?'ti-thumb-down':'ti-thumb-up';
    return `<div style="display:flex; align-items:center; gap:8px; font-size:12px; color:var(--ts); margin-bottom:4px;"><i class="ti ${icon}" style="font-size:13px; color:${tone};" aria-hidden="true"></i><span style="flex:1;">${s[0]}</span><span style="color:var(--tt); font-size:11px;">${s[1]} ulasan</span></div>`;
  }).join("");
  const q = quotes.map(t=>`<div class="quote">"${t}"</div>`).join("");
  return `<div style="border:0.5px solid var(--bt); border-radius:var(--r-lg); padding:13px 15px; margin-bottom:10px; background:var(--bg1);">
    <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:2px;">
      <div style="font-size:14px; font-weight:500;">${dimEng} <span style="font-size:11px; color:var(--tt); font-weight:400;">${friendly}</span></div>
      <div style="font-size:13px; color:${score<3?'var(--bad)':'var(--warn)'};">${score.toString().replace('.',',')} <span style="font-size:11px; color:var(--tt);">dari 5</span></div>
    </div>
    <div style="font-size:11px; color:var(--tt); margin-bottom:8px;">${dimDesc}</div>
    <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:9px;">
      <span style="font-size:11px; color:var(--ts); background:var(--bg2); padding:2px 9px; border-radius:var(--r-md);"><i class="ti ti-users" style="font-size:12px; vertical-align:-2px;" aria-hidden="true"></i> ${peer}</span>
      ${badge?`<span style="font-size:11px; color:var(--bad); background:#FCEBEB; padding:2px 9px; border-radius:var(--r-md);"><i class="ti ti-eye-off" style="font-size:12px; vertical-align:-2px;" aria-hidden="true"></i> ${badge}</span>`:''}
      <span style="font-size:11px; color:${confTone}; background:var(--bg2); padding:2px 9px; border-radius:var(--r-md);"><i class="ti ti-circle-check" style="font-size:12px; vertical-align:-2px;" aria-hidden="true"></i> ${conf}</span>
    </div>
    ${subRows}
    <div class="lnk" style="margin-top:7px;" onclick="toggle('q${idx}')"><i class="ti ti-quote" style="font-size:13px; vertical-align:-2px;" aria-hidden="true"></i> Lihat contoh ulasan asli</div>
    <div class="quotes" id="q${idx}">${q}</div>
  </div>`;
}

const panels = {
home: () => `
  <div style="background:var(--bg2); border-radius:var(--r-lg); padding:18px 20px; margin-bottom:18px;">
    <div style="font-size:18px; font-weight:500; margin-bottom:6px;">Selamat datang di SuaraPasien</div>
    <div style="font-size:13px; color:var(--ts); line-height:1.65;">SuaraPasien membaca ulasan warga tentang puskesmas di Google Maps, lalu merapikannya menjadi gambaran mutu layanan yang mudah dipahami. Tujuannya membantu Dinas Kesehatan dan kepala puskesmas mengetahui lebih cepat: layanan apa yang dipuji, apa yang dikeluhkan, dan puskesmas mana yang butuh perhatian, sebagai pelengkap penilaian akreditasi resmi yang hanya dilakukan tiap beberapa tahun.</div>
  </div>

  <div style="font-size:13px; font-weight:500; margin-bottom:8px;">Cara kerjanya, singkat</div>
  <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px;">
    <div style="background:var(--bg1); border:0.5px solid var(--bt); border-radius:var(--r-lg); padding:12px 14px;"><div style="font-size:12px; color:var(--info); font-weight:500; margin-bottom:4px;"><i class="ti ti-message-2" style="vertical-align:-2px;" aria-hidden="true"></i> 1. Dengar</div><div style="font-size:12px; color:var(--ts); line-height:1.5;">Kumpulkan ulasan warga dari Google Maps.</div></div>
    <div style="background:var(--bg1); border:0.5px solid var(--bt); border-radius:var(--r-lg); padding:12px 14px;"><div style="font-size:12px; color:var(--info); font-weight:500; margin-bottom:4px;"><i class="ti ti-category" style="vertical-align:-2px;" aria-hidden="true"></i> 2. Kelompokkan</div><div style="font-size:12px; color:var(--ts); line-height:1.5;">Pilah keluhan/pujian ke 5 dimensi mutu SERVQUAL.</div></div>
    <div style="background:var(--bg1); border:0.5px solid var(--bt); border-radius:var(--r-lg); padding:12px 14px;"><div style="font-size:12px; color:var(--info); font-weight:500; margin-bottom:4px;"><i class="ti ti-layout-dashboard" style="vertical-align:-2px;" aria-hidden="true"></i> 3. Tampilkan</div><div style="font-size:12px; color:var(--ts); line-height:1.5;">Sajikan sebagai peta, profil, dan sinyal yang bisa ditindak.</div></div>
  </div>

  <div style="font-size:13px; font-weight:500; margin-bottom:4px;">Kerangka penilaian: SERVQUAL</div>
  <div style="font-size:12px; color:var(--ts); margin-bottom:10px; line-height:1.6;">Mutu layanan diukur lewat 5 dimensi standar yang dipakai di banyak penelitian layanan kesehatan. Setiap ulasan warga dipetakan ke salah satu dimensi ini:</div>
  <div style="display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-bottom:22px;">
    ${[["Tangibles","ti-building-hospital","Kebersihan, fasilitas, ruang tunggu"],["Reliability","ti-circle-check","Obat tersedia, layanan tepat janji"],["Responsiveness","ti-clock-bolt","Cepat dilayani, waktu tunggu"],["Assurance","ti-shield-check","Kompetensi & kepercayaan tenaga medis"],["Empathy","ti-heart-handshake","Keramahan & komunikasi"]].map(d=>`<div style="background:var(--bg2); border-radius:var(--r-md); padding:10px 11px;"><i class="ti ${d[1]}" style="font-size:18px; color:#534AB7;" aria-hidden="true"></i><div style="font-size:12px; font-weight:500; margin:5px 0 3px;">${d[0]}</div><div style="font-size:11px; color:var(--ts); line-height:1.4;">${d[2]}</div></div>`).join("")}
  </div>

  <div style="font-size:13px; font-weight:500; margin-bottom:3px;">Gambaran data saat ini</div>
  <div style="font-size:11px; color:var(--tt); margin-bottom:10px;">Tahap demonstrasi: 3 wilayah perkotaan. Mencakup puskesmas yang punya halaman ulasan di Google Maps.</div>
  <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:22px;">
    ${statCard("Ulasan terkumpul","69.031")}
    ${statCard("Berisi cerita","~33 rb","separuhnya")}
    ${statCard("Puskesmas","127","Semarang, Surabaya, Bantul")}
    ${statCard("Wilayah","3","kota & kabupaten")}
  </div>

  <div style="font-size:13px; font-weight:500; margin-bottom:3px;"><i class="ti ti-bulb" style="color:#BA7517; vertical-align:-2px;" aria-hidden="true"></i> Tahukah Anda?</div>
  <div style="font-size:11px; color:var(--tt); margin-bottom:10px;">Beberapa temuan awal dari data ulasan.</div>
  <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:8px;">
    ${fcard("ti-chart-bar-off","#534AB7","Warga memberi nilai ekstrem","92% ulasan menumpuk di bintang 1 atau bintang 5. Sangat sedikit yang memberi nilai tengah; yang menulis biasanya yang sangat puas atau sangat kecewa.")}
    ${fcard("ti-text-size","#1D9E75","Keluhan panjang, pujian singkat","Ulasan bintang 1 rata-rata 175 huruf, bintang 5 hanya 49 huruf. Keluhan berisi cerita rinci, pujian sering hanya satu kata.")}
    ${fcard("ti-eye-off","#BA7517","Bintang menyembunyikan keluhan","Hampir 1 dari 10 ulasan bintang tinggi menyimpan kritik di teksnya. Inilah kenapa kita perlu membaca isi ulasan, bukan cuma melihat bintang.")}
    ${fcard("ti-clock-hour-4","#A32D2D","Antre keluhan paling umum","Soal antre &amp; waktu tunggu muncul di 88% puskesmas, lintas tiga wilayah. Ini pola yang merata, bukan masalah satu-dua tempat.")}
    ${fcard("ti-map-pin","#185FA5","Surabaya paling kritis","17% ulasan Surabaya bintang 1, hampir tiga kali Semarang (6%). Bisa karena mutu, bisa karena kebiasaan mengulas, masih perlu dicek.")}
    ${fcard("ti-users","#0F6E56","Hampir semua menulis sekali","96% penulis ulasan hanya mengulas satu kali. Suara ini mewakili warga yang aktif menulis, belum tentu seluruh pasien.")}
  </div>
  <div style="font-size:11px; color:var(--tt); margin-top:10px; line-height:1.5;"><i class="ti ti-info-circle" style="vertical-align:-2px;" aria-hidden="true"></i> Catatan: data berasal dari ulasan publik di Google Maps. Warga yang menulis ulasan belum tentu mewakili semua pasien, jadi angka di sini dibaca sebagai salah satu sudut pandang, bukan penilaian mutu yang menyeluruh.</div>`,

map: () => `
  <div style="font-size:16px; font-weight:500; margin-bottom:3px;">Peta status mutu</div>
  <div style="font-size:12px; color:var(--ts); margin-bottom:12px;">Cari puskesmas lewat kotak pencarian, atau geser &amp; klik pin di peta untuk melihat ringkasannya.</div>
  <div style="display:flex; gap:8px; margin-bottom:10px;">
    <input id="mapsearch" placeholder="Cari nama puskesmas..." style="flex:1;" oninput="filterPins()"/>
    <select id="mapregion" onchange="flyRegion()"><option value="">Semua wilayah</option><option>Semarang</option><option>Surabaya</option><option>Bantul</option></select>
  </div>
  <div id="leafmap" style="height:340px; border-radius:var(--r-lg); overflow:hidden; border:0.5px solid var(--bt);"></div>
  <div id="pinhits" style="font-size:11px; color:var(--tt); margin-top:8px;"></div>
  <div style="font-size:11px; color:var(--tt); margin-top:6px; line-height:1.5;"><i class="ti ti-info-circle" style="vertical-align:-2px;" aria-hidden="true"></i> Posisi pin di mock-up ini hanya perkiraan untuk peraga. Hanya puskesmas yang punya halaman Google Maps yang muncul. Warna pin: hijau baik, kuning perlu dipantau, merah perlu ditindaklanjuti.</div>`,

profile: () => {
  return `
  <div style="font-size:16px; font-weight:500; margin-bottom:3px;">Profil puskesmas</div>
  <div style="font-size:12px; color:var(--ts); margin-bottom:12px;">Pilih wilayah lalu puskesmas, atau ketik untuk mencari. Lihat penilaian per dimensi SERVQUAL.</div>
  <div style="display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap;">
    <div><div style="font-size:11px; color:var(--tt); margin-bottom:3px;">Daerah</div><select id="selRegion" onchange="onRegion()"><option value="">Pilih wilayah</option><option>Semarang</option><option>Surabaya</option><option>Bantul</option></select></div>
    <div><div style="font-size:11px; color:var(--tt); margin-bottom:3px;">Puskesmas</div><select id="selPkm" onchange="onPkm()" style="min-width:200px;"><option>Pilih wilayah dulu</option></select></div>
    <div style="flex:1; min-width:150px;"><div style="font-size:11px; color:var(--tt); margin-bottom:3px;">atau cari nama</div><input id="pkmSearch" placeholder="ketik nama puskesmas..." oninput="searchPkm()" style="width:100%;"/></div>
  </div>
  <div id="profileBody"><div style="font-size:12px; color:var(--tt); padding:30px 0; text-align:center;">Pilih puskesmas untuk melihat profilnya.</div></div>`;
},

signal: () => `
  <div style="font-size:16px; font-weight:500; margin-bottom:3px;">Sinyal yang perlu diperhatikan</div>
  <div style="font-size:12px; color:var(--ts); margin-bottom:14px;">Puskesmas yang terlihat baik di angka bintang, tapi teksnya banyak keluhan.</div>
  <div style="font-size:12px; font-weight:500; margin-bottom:7px;"><i class="ti ti-eye-off" style="font-size:15px; vertical-align:-2px; margin-right:5px;" aria-hidden="true"></i>Bintang tinggi tapi teks mengeluh</div>
  <table style="width:100%; border-collapse:collapse; margin-bottom:16px;">
    <tr style="border-bottom:0.5px solid var(--bs);"><td style="font-size:11px; color:var(--tt); padding:0 6px 6px;">Puskesmas</td><td style="font-size:11px; color:var(--tt); padding:0 6px 6px;">Wilayah</td><td style="font-size:11px; color:var(--tt); padding:0 6px 6px; text-align:right;">Bintang</td><td style="font-size:11px; color:var(--tt); padding:0 6px 6px; text-align:right;">Teks mengeluh</td><td style="padding:0 6px 6px;"></td></tr>
    ${row("Sukolilo","Surabaya","4,6","31%","selisih besar","#A32D2D","#FCEBEB")}
    ${row("Rowosari","Semarang","4,5","24%","perlu dicek","#854F0B","#FAEEDA")}
    ${row("Mlati 2","Bantul","4,7","19%","perlu dicek","#854F0B","#FAEEDA")}
  </table>
  <div style="font-size:12px; font-weight:500; margin-bottom:7px;"><i class="ti ti-arrows-split" style="font-size:15px; vertical-align:-2px; margin-right:5px;" aria-hidden="true"></i>Puskesmas dengan dua wajah (banyak yang sangat puas sekaligus banyak yang sangat kecewa)</div>
  <table style="width:100%; border-collapse:collapse;">
    ${row("Made","Surabaya","Bintang 1: 31%","Bintang 5: 53%","dua wajah","#26215C","#EEEDFE")}
    ${row("Pacar Keling","Surabaya","Bintang 1: 29%","Bintang 5: 58%","dua wajah","#26215C","#EEEDFE")}
  </table>
  <div style="font-size:11px; color:var(--tt); margin-top:12px;">Puskesmas dua wajah menunjukkan kenapa satu label akreditasi saja tidak cukup: pengalaman warga sangat berbeda-beda di tempat yang sama.</div>`,

topic: () => `
  <div style="font-size:16px; font-weight:500; margin-bottom:3px;">Topik keluhan se-kabupaten</div>
  <div style="font-size:12px; color:var(--ts); margin-bottom:16px;">Mana keluhan yang muncul di banyak puskesmas (perlu kebijakan dinas) dan mana yang hanya di sedikit puskesmas (urusan masing-masing).</div>
  <div style="font-size:13px; font-weight:500; margin-bottom:4px;">Seberapa luas tiap keluhan menyebar</div>
  <div class="hint" style="margin-bottom:10px;">Klik sebuah keluhan untuk melihat puskesmas mana saja yang paling sering dikeluhkan soal itu.</div>
  ${[

    ["Sikap petugas","25","#BA7517","Empathy","cukup tersebar di banyak puskesmas",[["Tembok Dukuh","Surabaya","sering disebut"],["Pacar Keling","Surabaya","sering disebut"]],"sistemik"],
    ["BPJS &amp; rujukan","18","#BA7517","Reliability","tersebar merata, sering jadi satu paket masalah",[["beberapa puskesmas Surabaya","Surabaya","pola serupa"]],"sistemik"],
    ["Obat kosong","19","#1D9E75","Reliability","menumpuk di sebagian puskesmas Semarang, kemungkinan soal pasokan setempat",[["Ngemplak Simongan","Semarang","60% keluhannya soal obat"],["Pudakpayung","Semarang","42%"],["Pandak 2","Bantul","39%"]],"lokal"],

  ].map((t,i)=>{

    const tag = t[6]==='sistemik'?`<span style="font-size:10px; color:#26215C; background:#EEEDFE; padding:2px 8px; border-radius:var(--r-md);">perlu kebijakan dinas</span>`:`<span style="font-size:10px; color:#0F6E56; background:#E1F5EE; padding:2px 8px; border-radius:var(--r-md);">urusan puskesmas</span>`;
    return `<div style="margin-bottom:9px;"><div onclick="toggle('d${i}')" style="cursor:pointer; display:flex; align-items:center; gap:10px;"><div style="width:130px; font-size:12px; color:var(--ts); flex-shrink:0;">${t[0]} <span style="color:var(--tt); font-size:10px;">${t[3]}</span></div><div style="flex:1; height:18px; background:var(--bg2); border-radius:4px; overflow:hidden;"><div style="width:${t[1]}%; height:100%; background:${t[2]};"></div></div><div style="width:30px; font-size:11px; color:var(--tt); text-align:right;">${t[1]}%</div><i class="ti ti-chevron-down" style="font-size:14px; color:var(--tt);" aria-hidden="true"></i></div><div style="margin:3px 0 0 140px;">${tag} <span style="font-size:11px; color:var(--tt);">${t[4]}</span></div><div class="drill" id="d${i}">${drillRows}</div></div>`;
  }).join("")}
  <div style="font-size:11px; color:var(--tt); margin:4px 0 16px;">Angka = persen keluhan warga yang menyebut topik ini. Perkiraan awal dari kata kunci, akan diperhalus oleh model.</div>
  <div style="font-size:13px; font-weight:500; margin-bottom:8px;">Keluhan yang sering datang bersamaan</div>
  <div style="background:var(--bg2); border-radius:var(--r-lg); padding:12px 14px; font-size:12px; color:var(--ts); line-height:1.6; margin-bottom:16px;">Warga yang mengeluh soal <b style="font-weight:500; color:var(--tp);">BPJS</b> hampir selalu juga menyebut <b style="font-weight:500; color:var(--tp);">rujukan</b> dan <b style="font-weight:500; color:var(--tp);">obat</b> dalam ulasan yang sama. Ketiganya termasuk dimensi Reliability, dan sebaiknya dibenahi bersamaan.</div>
  <div style="font-size:13px; font-weight:500; margin-bottom:8px;">Apakah sama di tiap wilayah?</div>
  <table style="width:100%; border-collapse:collapse; font-size:12px;">
    <tr style="border-bottom:0.5px solid var(--bs); color:var(--tt); font-size:11px;"><td style="padding:0 6px 6px;">Keluhan</td><td style="padding:0 6px 6px; text-align:right;">Bantul</td><td style="padding:0 6px 6px; text-align:right;">Semarang</td><td style="padding:0 6px 6px; text-align:right;">Surabaya</td></tr>
    ${[["Antre &amp; tunggu","46%","40%","42%"],["Sikap petugas","28%","23%","25%"],["BPJS &amp; rujukan","17%","18%","18%"],["Obat kosong","14%","21%","19%"]].map(r=>`<tr style="border-bottom:0.5px solid var(--bt);"><td style="padding:7px 6px;">${r[0]}</td><td style="padding:7px 6px; text-align:right;">${r[1]}</td><td style="padding:7px 6px; text-align:right;">${r[2]}</td><td style="padding:7px 6px; text-align:right;">${r[3]}</td></tr>`).join("")}
  </table>
  <div style="font-size:11px; color:var(--tt); margin-top:8px;">Antre dan sikap petugas hampir sama di tiga wilayah, jadi benar-benar merata. Obat lebih tinggi di Semarang, patut dicek pasokannya.</div>`,

flow: () => `
  <div style="font-size:16px; font-weight:500; margin-bottom:3px;">Workflow analisis</div>
  <div style="font-size:12px; color:var(--ts); margin-bottom:16px;">Dari ulasan mentah sampai jadi penilaian, langkah demi langkah yang transparan.</div>
  ${[
    ["ti-download","1. Pengumpulan","Ambil ulasan dari Google Maps di 3 wilayah: 69.031 ulasan, 127 puskesmas.","#534AB7"],

    ["ti-scissors","3. Persiapan analisis","Pecah ulasan panjang jadi kalimat, ambil hanya yang menyebut layanan, jaga konteks kalimat.","#1D9E75"],
    ["ti-cpu","4. Analisis isi ulasan","Model membaca tiap kalimat, mengenali layanan apa yang dibahas (dipetakan ke 5 dimensi SERVQUAL) dan apakah dipuji atau dikeluhkan.","#1D9E75"],

    ["ti-layout-dashboard","6. Dashboard","Tampilkan nilai, poin pujian dan keluhan, kutipan asli, peta, dan sinyal yang perlu perhatian.","#BA7517"],
  ].map((s,i,arr)=>`<div style="display:flex; gap:12px; align-items:flex-start; ${i<arr.length-1?'padding-bottom:12px; position:relative;':''}"><div style="width:34px; height:34px; border-radius:50%; background:var(--bg2); display:flex; align-items:center; justify-content:center; flex-shrink:0; ${i<arr.length-1?'box-shadow:0 22px 0 -16px var(--bs);':''}"><i class="ti ${s[0]}" style="font-size:17px; color:${s[3]};" aria-hidden="true"></i></div><div style="padding-top:6px;"><div style="font-size:13px; font-weight:500;">${s[1]}</div><div style="font-size:12px; color:var(--ts); line-height:1.5; margin-top:1px;">${s[2]}</div></div></div>`).join("")}

function colorFor(mean){ return mean>=4.5?'#1D9E75':mean>=4.1?'#BA7517':'#E24B4A'; }

let markers=[];
function initMap(){
  if(mapObj){ mapObj.remove(); mapObj=null; }
  markers=[];
  mapObj = L.map('leafmap').setView([-7.3,111.2], 6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19, attribution:'OpenStreetMap'}).addTo(mapObj);
  let idx=0;
  for(const region in PKM){
    const [clat,clng]=CITY[region];
    PKM[region].forEach((p,i)=>{
      const lat=clat+(Math.sin(i*1.7)*0.035), lng=clng+(Math.cos(i*2.3)*0.045);
      const col=colorFor(p[1]);
      const m=L.circleMarker([lat,lng],{radius:8,fillColor:col,color:'#fff',weight:2,fillOpacity:0.9}).addTo(mapObj);
      m.bindPopup(`<div style="font-family:Inter,sans-serif; min-width:170px;"><div style="font-size:13px; font-weight:500; margin-bottom:4px;">Puskesmas ${p[0]}</div><div style="font-size:11px; color:#5f5e5a; margin-bottom:6px;">${region}</div><table style="font-size:11px; width:100%;"><tr><td style="color:#5f5e5a; padding:1px 0;">Rating rata-rata</td><td style="text-align:right;">${p[1].toFixed(2)} / 5</td></tr><tr><td style="color:#5f5e5a; padding:1px 0;">Jumlah ulasan</td><td style="text-align:right;">${p[2].toLocaleString('id')}</td></tr><tr><td style="color:#5f5e5a; padding:1px 0;">Ulasan berteks</td><td style="text-align:right;">${p[3].toLocaleString('id')}</td></tr></table><a class="gm-link" href="https://www.google.com/maps/search/Puskesmas+${encodeURIComponent(p[0])}" target="_blank" style="display:inline-block; margin-top:6px;"><i class="ti ti-external-link" style="vertical-align:-2px;"></i> Buka di Google Maps</a></div>`);
      markers.push({name:p[0].toLowerCase(),region,marker:m,lat,lng});
      idx++;
    });
  }
}
function filterPins(){
  const q=(document.getElementById('mapsearch').value||'').toLowerCase();
  let hit=0, first=null;
  markers.forEach(o=>{
    const show = !q || o.name.includes(q);
    if(show){ o.marker.addTo(mapObj); hit++; if(!first) first=o; }
    else { mapObj.removeLayer(o.marker); }
  });
  document.getElementById('pinhits').textContent = q?`${hit} puskesmas cocok`:'';
  if(q && first){ mapObj.flyTo([first.lat,first.lng],13); first.marker.openPopup(); }
}
function flyRegion(){
  const r=document.getElementById('mapregion').value;
  if(r && CITY[r]) mapObj.flyTo(CITY[r],12);
  else mapObj.flyTo([-7.3,111.2],6);
}

function onRegion(){
  const r=document.getElementById('selRegion').value;
  const sel=document.getElementById('selPkm');
  if(!r){ sel.innerHTML='<option>Pilih wilayah dulu</option>'; return; }
  sel.innerHTML='<option value="">Pilih puskesmas</option>'+PKM[r].map(p=>`<option>${p[0]}</option>`).join('');
}
function searchPkm(){
  const q=(document.getElementById('pkmSearch').value||'').toLowerCase();
  if(!q) return;
  for(const r in PKM){ const f=PKM[r].find(p=>p[0].toLowerCase().includes(q)); if(f){ document.getElementById('selRegion').value=r; onRegion(); document.getElementById('selPkm').value=f[0]; onPkm(); return; } }
}
function onPkm(){
  const name=document.getElementById('selPkm').value;
  const r=document.getElementById('selRegion').value;
  if(!name){ document.getElementById('profileBody').innerHTML='<div style="font-size:12px; color:var(--tt); padding:30px 0; text-align:center;">Pilih puskesmas untuk melihat profilnya.</div>'; return; }
  const p=PKM[r].find(x=>x[0]===name);
  const body=document.getElementById('profileBody');
  body.innerHTML=`
    <div style="margin-bottom:10px;"><div style="font-size:15px; font-weight:500;">Puskesmas ${name} <span style="font-size:12px; color:var(--tt); font-weight:400;">, ${r}</span></div><div style="font-size:12px; color:var(--ts);">${p[2].toLocaleString('id')} ulasan, ${p[3].toLocaleString('id')} berisi cerita, rating rata-rata ${p[1].toFixed(2)}</div></div>
    <div style="font-size:12px; color:var(--ts); margin-bottom:12px;">Penilaian per dimensi SERVQUAL. Hijau berarti dipuji, merah berarti dikeluhkan. (Skor contoh, menunggu hasil model.)</div>
    ${dimCard(1,"Responsiveness",DIMS[0][1],"daya tanggap",2.4,"Cukup banyak data","var(--ok)","Termasuk paling lambat di antara 30 puskesmas sejenis","Bintang tinggi, tapi banyak keluhan di teks",[["Antre lama menunggu giliran","38","neg"],["Antrean online dianggap tidak adil","15","neg"],["Daftar online mempercepat","18","pos"]],["Antre 1 jam lebih, padahal sudah daftar online dari pagi","Yang datang belakangan malah dilayani duluan"])}
    ${dimCard(2,"Empathy",DIMS[3][1],"empati",3.1,"Cukup banyak data","var(--ok)","Setara rata-rata puskesmas sejenis","",[["Sebagian petugas judes atau membeda-bedakan","24","neg"],["Dokter sabar membimbing","44","pos"]],["Dokternya sabar menjelaskan sampai saya paham","Sayang petugas depan kurang ramah"])}
    ${dimCard(3,"Reliability",DIMS[1][1],"kehandalan",2.9,"Datanya sedang","var(--warn)","Sedikit di bawah rata-rata","",[["Obat sering kosong, harus beli di luar","19","neg"],["Layanan lab lengkap","22","pos"]],["Obatnya habis terus, akhirnya disuruh beli di apotek luar"])}
    <div style="border:0.5px dashed var(--bs); border-radius:var(--r-lg); padding:11px 14px; font-size:12px; color:var(--tt); display:flex; align-items:center; gap:8px;"><i class="ti ti-info-circle" style="font-size:16px;" aria-hidden="true"></i> Assurance &amp; Tangibles: belum cukup warga yang membahas ini (kurang dari 10 ulasan), jadi belum bisa dinilai.</div>`;
}

function setTab(id){
  active=id; renderNav(); panelEl.innerHTML=panels[id]();
  if(id==='map'){ setTimeout(initMap, 60); }
}
renderNav(); setTab("home");
</script>
